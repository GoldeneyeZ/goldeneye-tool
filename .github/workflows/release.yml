name: Native release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      version:
        description: "Workspace version to build (without v)"
        required: true
        type: string
      publish:
        description: "Create the GitHub release after every check passes"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.release.outputs.version }}
      publish: ${{ steps.release.outputs.publish }}
    steps:
      - uses: actions/checkout@v4
      - id: release
        name: Resolve and validate release version
        shell: bash
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            version="${GITHUB_REF_NAME#v}"
            publish=true
          else
            version="${{ inputs.version }}"
            publish="${{ inputs.publish }}"
          fi
          python - "$version" <<'PY'
          import pathlib
          import re
          import sys
          import tomllib

          version = sys.argv[1]
          if re.fullmatch(r"\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?", version) is None:
              raise SystemExit(f"invalid release version: {version}")
          cargo = tomllib.loads(pathlib.Path("Cargo.toml").read_text(encoding="utf-8"))
          workspace = cargo["workspace"]["package"]["version"]
          if version != workspace:
              raise SystemExit(f"requested {version}, Cargo workspace is {workspace}")
          PY
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            platform: linux
            arch: x64
            extension: tar.gz
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux
            arch: arm64
            extension: tar.gz
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            platform: darwin
            arch: x64
            extension: tar.gz
          - runner: macos-14
            target: aarch64-apple-darwin
            platform: darwin
            arch: arm64
            extension: tar.gz
          - runner: windows-2025
            target: x86_64-pc-windows-msvc
            platform: windows
            arch: x64
            extension: zip
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            platform: windows
            arch: arm64
            extension: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build native binary
        run: cargo build --locked --release --package goldeneye --target ${{ matrix.target }}

      - name: Smoke and archive Unix payload
        if: runner.os != 'Windows'
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TARGET: ${{ matrix.target }}
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          stage="dist/stage"
          asset="goldeneye-$PLATFORM-$ARCH.tar.gz"
          mkdir -p "$stage"
          cp "target/$TARGET/release/goldeneye" "$stage/goldeneye"
          cp LICENSE NOTICE "$stage/"
          test "$("$stage/goldeneye" --version)" = "goldeneye $VERSION"
          tar -C "$stage" -czf "dist/$asset" goldeneye LICENSE NOTICE
          tar -tzf "dist/$asset" | grep -Fx goldeneye
          tar -tzf "dist/$asset" | grep -Fx LICENSE
          tar -tzf "dist/$asset" | grep -Fx NOTICE

      - name: Smoke and archive Windows payload
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TARGET: ${{ matrix.target }}
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
        run: |
          $ErrorActionPreference = 'Stop'
          $stage = 'dist/stage'
          $asset = "goldeneye-$env:PLATFORM-$env:ARCH.zip"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item -LiteralPath "target/$env:TARGET/release/goldeneye.exe" -Destination "$stage/goldeneye.exe"
          Copy-Item -LiteralPath LICENSE, NOTICE -Destination $stage
          $actual = (& "$stage/goldeneye.exe" --version | Out-String).Trim()
          if ($actual -ne "goldeneye $env:VERSION") {
            throw "unexpected version output: $actual"
          }
          Compress-Archive -Path "$stage/*" -DestinationPath "dist/$asset" -CompressionLevel Optimal
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [IO.Compression.ZipFile]::OpenRead((Resolve-Path "dist/$asset"))
          try {
            $names = @($archive.Entries | ForEach-Object FullName)
            foreach ($required in @('goldeneye.exe', 'LICENSE', 'NOTICE')) {
              if ($required -notin $names) { throw "$asset is missing $required" }
            }
          } finally {
            $archive.Dispose()
          }

      - name: Upload native archive
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/goldeneye-${{ matrix.platform }}-${{ matrix.arch }}.${{ matrix.extension }}
          if-no-files-found: error
          retention-days: 7

  manifest:
    needs: [prepare, build]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Download native archives
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: dist
          merge-multiple: true
      - name: Verify archives and render package metadata
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          (
            cd dist
            sha256sum goldeneye-* > checksums.txt
          )
          python packaging/verify_release.py +            --version "$VERSION" +            --checksums dist/checksums.txt +            --artifacts dist
          python packaging/render_release.py +            --version "$VERSION" +            --checksums dist/checksums.txt +            --output rendered
          tar -C rendered -czf "dist/goldeneye-packaging-$VERSION.tar.gz" .
          (
            cd dist
            sha256sum "goldeneye-packaging-$VERSION.tar.gz" >> checksums.txt
          )
      - name: Upload verified release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: |
            dist/goldeneye-*
            dist/checksums.txt
          if-no-files-found: error
          retention-days: 14

  publish:
    needs: [prepare, manifest]
    if: needs.prepare.outputs.publish == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download verified release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: dist
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          gh release create "v$VERSION" dist/* +            --verify-tag +            --title "Goldeneye v$VERSION" +            --generate-notes
